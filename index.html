<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logística — AY Morena Eventos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #efeee8; min-height: 100%; }
    body { font-family: 'Manrope', system-ui, sans-serif; color: #1c1a16; }

    .tabs {
      position: sticky; top: 0; z-index: 50;
      background: rgba(239,238,232,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #e2ddd0;
    }
    .tabs-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px; flex-wrap: wrap;
    }
    .tab-brand {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #5a5246; font-weight: 700; margin-right: 12px;
    }
    .tab {
      background: none; border: none; cursor: pointer;
      padding: 8px 14px; border-radius: 999px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: #5a5246; letter-spacing: 0.01em;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover { background: rgba(0,0,0,0.04); }
    .tab.active { background: #1c1a16; color: #fafaf7; }
    .tab .badge {
      font-size: 10px; padding: 2px 7px; border-radius: 999px;
      background: #d93025; color: #fff; font-weight: 800; letter-spacing: 0.04em;
    }
    .tab.active .badge { background: #fafaf7; color: #1c1a16; }
    .tab-counter { margin-left: auto; font-size: 11px; color: #8a8275; }

    .pager { max-width: 900px; margin: 0 auto; padding: 16px 24px 24px; }
    .sheet {
      background: #fafaf7; border-radius: 18px; overflow: hidden;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 12px 32px rgba(28,26,22,0.06);
    }
    .page-enter { animation: fadeSlide 0.32s ease both; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footnav {
      max-width: 900px; margin: 0 auto;
      padding: 8px 24px 32px;
      display: flex; justify-content: space-between; gap: 12px;
    }
    .footbtn {
      background: #fff; border: 1px solid #ebe7dc; border-radius: 12px;
      padding: 14px 18px; cursor: pointer; font-family: inherit;
      flex: 1; text-align: left; transition: background 0.15s, transform 0.1s;
    }
    .footbtn:hover { background: #f5f3ec; }
    .footbtn:active { transform: translateY(1px); }
    .footbtn .label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #8a8275; font-weight: 700; }
    .footbtn .title { font-size: 14px; font-weight: 700; color: #1c1a16; margin-top: 4px; }
    .footbtn.right { text-align: right; }
    .footnav .placeholder { flex: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ==============================================================
       DATOS DE LA SEMANA — ACTUALIZAR CADA LUNES
    ============================================================== */
    const SEMANA = {
      semana: "21–30 mayo",
      updatedAt: "Martes 20 mayo · 13:58",
      kpis: {
        diaPico: { dia: "Jueves", eventos: 2 },
        minimoEquipos: { amplificacion: 2, torreHumo: 2 },
        porConfirmar: 2
      },
      dias: [
        {
          dia: "Jueves",
          fecha: "21 mayo",
          esPico: true,
          eventos: [
            {
              id: 1,
              hora: "15:00",
              duracion: null,
              paquete: "Deluxe Corporativo",
              status: "pendiente-info",
              equipos: ["Amplificación", "Torre + Humo"],
              notas: "Empresa: Bruna Álvarez · Sin dirección",
              operador: "Bruno / Matías"
            },
            {
              id: 2,
              hora: "16:00",
              duracion: "3 HRS",
              paquete: "Show LED — Bluey",
              status: "confirmado",
              equipos: ["Amplificación", "Torre + Humo"],
              notas: "Botarga Bluey · Parque Galáctic",
              operador: "Rilver / Leo / Mathias"
            }
          ]
        },
        {
          dia: "Viernes",
          fecha: "22 mayo",
          esPico: false,
          eventos: [
            {
              id: 3,
              hora: "09:00",
              duracion: "8 HRS",
              paquete: "Corporativo — Grupo Peso",
              status: "confirmado",
              equipos: ["Amplificación"],
              notas: "Video Resumen (Diego) · Pasando Okinawa",
              operador: "Edgar / Daniel / Susan"
            }
          ]
        },
        {
          dia: "Sábado",
          fecha: "30 mayo",
          esPico: false,
          eventos: [
            {
              id: 4,
              hora: "08:00",
              duracion: null,
              paquete: "Producción Sonido — Iyambae",
              status: "pendiente-info",
              equipos: ["Amplificación", "Karaoke interior"],
              notas: "Sistema de sonido: 1 consola digital 12 canales Soundcraf · 4 subwoofer activos · 4 linearrays FBT · 1 retorno kl15 · 2 mic inalámbrico de mano · Laptop · Operador de sonido — Sonido interior (sala karaoke): 2 bocinas kl15 · 2 micrófonos inalámbricos · Pantalla led 4 mt2 · Laptop · Contenido visual para karaoke · Operador",
              operador: "Edgar Tomas Hernandez"
            }
          ]
        }
      ],
      pendientes: [
        {
          id: 1,
          prioridad: "alta",
          eventoId: 1,
          paquete: "Deluxe Corporativo",
          dia: "Jueves 21 mayo",
          falta: [
            { campo: "Dirección", detalle: "No figura en la convocatoria" },
            { campo: "Duración", detalle: "No especificada — afecta rotación de equipos" }
          ],
          impacto: "Sin dirección no se puede planificar traslado. Sin duración no se confirma si el equipo libera antes del cierre del Show LED (19:00).",
          preguntas: [
            "¿Cuál es la dirección del evento Deluxe Corporativo?",
            "¿A qué hora termina el evento (duración aproximada)?"
          ]
        },
        {
          id: 2,
          prioridad: "alta",
          eventoId: 4,
          paquete: "Producción Sonido — Iyambae",
          dia: "Sábado 30 mayo",
          falta: [
            { campo: "Duración", detalle: "No especificada — no se puede confirmar disponibilidad de equipos" },
            { campo: "Tipo de evento", detalle: "No corresponde a un paquete estándar — requiere definición" }
          ],
          impacto: "Sin duración no se puede confirmar si los equipos quedan disponibles para otros compromisos del fin de semana.",
          preguntas: [
            "¿A qué hora termina el evento en Iyambae?",
            "¿Es producción propia o cliente externo? ¿Qué paquete aplica?"
          ]
        }
      ]
    };

    /* ==============================================================
       COMPONENTES — NO MODIFICAR
    ============================================================== */

    const C = {
      verde:  { bg: "#eef4f0", border: "#cfe1d4", text: "#1f5b3f", dark: "#143d2a" },
      ambar:  { bg: "#fff8e6", border: "#f3d896", text: "#c97e00", dark: "#5a3a00", header: "#f1d99c" },
      rojo:   { bg: "#fdecea", border: "#f5b8b1", text: "#d93025", dark: "#5a1c18", soft: "#fef7f5" }
    };

    const STATUS_CFG = {
      "confirmado":     { label: "CONFIRMADO",    color: C.verde },
      "hora-pendiente": { label: "HORA PENDIENTE", color: C.ambar },
      "pendiente-info": { label: "INFO PENDIENTE", color: C.rojo  }
    };

    function StatusPill({ status }) {
      const s = STATUS_CFG[status] || STATUS_CFG["pendiente-info"];
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 5,
          borderRadius: 999, padding: "3px 10px",
          fontSize: 10, fontWeight: 700, letterSpacing: "0.04em",
          background: s.color.bg, border: `1px solid ${s.color.border}`, color: s.color.text
        }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: s.color.text, display: "inline-block" }} />
          {s.label}
        </span>
      );
    }

    function EquipoPill({ equipo }) {
      const isTorre = equipo === "Torre + Humo";
      return (
        <span style={{
          display: "inline-flex", alignItems: "center",
          borderRadius: 999, padding: "3px 10px",
          fontSize: 10, fontWeight: 700, letterSpacing: "0.04em",
          background: isTorre ? C.verde.dark : C.verde.bg,
          border: `1px solid ${isTorre ? C.verde.dark : C.verde.border}`,
          color: isTorre ? "#fff" : C.verde.text
        }}>
          {equipo}
        </span>
      );
    }

    function PendientePill() {
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 5,
          borderRadius: 999, padding: "3px 10px",
          fontSize: 10, fontWeight: 700, letterSpacing: "0.04em",
          background: C.rojo.bg, border: `1px solid ${C.rojo.border}`, color: C.rojo.text
        }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: C.rojo.text, display: "inline-block" }} />
          PENDIENTE
        </span>
      );
    }

    /* ------------ RESUMEN ------------ */

    function Resumen({ semana, onGoPendientes }) {
      const { kpis, dias, pendientes } = semana;

      return (
        <div style={{ padding: 48 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "#5a5246", fontWeight: 700, marginBottom: 6 }}>
                AY MORENA EVENTOS · LOGÍSTICA
              </div>
              <h1 style={{ margin: 0, fontSize: 30, fontWeight: 800, letterSpacing: "-0.02em", color: "#1c1a16" }}>
                Semana del {semana.semana}
              </h1>
            </div>
            <div style={{ fontSize: 12, color: "#8a8275", textAlign: "right", paddingTop: 6 }}>
              Actualizado<br />
              <span style={{ fontWeight: 700, color: "#5a5246" }}>{semana.updatedAt}</span>
            </div>
          </div>

          {/* KPIs */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 32 }}>
            <div style={{ borderRadius: 14, padding: 18, background: C.ambar.bg, border: `1px solid ${C.ambar.border}` }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.ambar.text, marginBottom: 8 }}>Día pico</div>
              <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em", color: C.ambar.dark, marginBottom: 4 }}>{kpis.diaPico.dia}</div>
              <div style={{ fontSize: 12, color: C.ambar.text }}>{kpis.diaPico.eventos} eventos</div>
            </div>
            <div style={{ borderRadius: 14, padding: 18, background: C.verde.bg, border: `1px solid ${C.verde.border}` }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.verde.text, marginBottom: 8 }}>Mínimo de equipos</div>
              <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em", color: C.verde.dark, marginBottom: 4 }}>{kpis.minimoEquipos.amplificacion} amp</div>
              <div style={{ fontSize: 12, color: C.verde.text }}>{kpis.minimoEquipos.torreHumo} torre + humo</div>
            </div>
            <div style={{ borderRadius: 14, padding: 18, background: C.rojo.bg, border: `1px solid ${C.rojo.border}` }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.rojo.text, marginBottom: 8 }}>Por confirmar</div>
              <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em", color: C.rojo.dark, marginBottom: 4 }}>{kpis.porConfirmar} eventos</div>
              <div style={{ fontSize: 12, color: C.rojo.text }}>información incompleta</div>
            </div>
          </div>

          {/* Programación */}
          <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "#8a8275", fontWeight: 700, marginBottom: 12 }}>
            Programación
          </div>

          {dias.map(dia => {
            const sinInfo = dia.eventos.filter(e => e.status === "pendiente-info").length;
            const isPico = dia.esPico;
            return (
              <div key={dia.dia} style={{ borderRadius: 14, border: "1px solid #e2ddd0", overflow: "hidden", marginBottom: 12 }}>
                <div style={{
                  padding: "12px 18px",
                  background: isPico ? C.ambar.header : "#f3f0e8",
                  display: "flex", alignItems: "center", justifyContent: "space-between"
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: isPico ? C.ambar.dark : "#1c1a16" }}>{dia.dia}</span>
                    <span style={{ fontSize: 12, color: isPico ? C.ambar.text : "#8a8275" }}>{dia.fecha}</span>
                    {isPico && (
                      <span style={{ borderRadius: 999, padding: "2px 8px", fontSize: 10, fontWeight: 800, letterSpacing: "0.06em", background: C.ambar.text, color: "#fff" }}>
                        DÍA PICO
                      </span>
                    )}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 12, color: "#8a8275" }}>{dia.eventos.length} evento{dia.eventos.length !== 1 ? "s" : ""}</span>
                    {sinInfo > 0 && (
                      <span style={{ borderRadius: 999, padding: "2px 8px", fontSize: 10, fontWeight: 800, background: C.rojo.bg, border: `1px solid ${C.rojo.border}`, color: C.rojo.text }}>
                        {sinInfo} sin info
                      </span>
                    )}
                  </div>
                </div>
                {dia.eventos.map(ev => {
                  const barColor = ev.status === "pendiente-info" ? C.rojo.text
                    : ev.status === "hora-pendiente" ? C.ambar.text : "#e2ddd0";
                  return (
                    <div key={ev.id} style={{
                      display: "flex", alignItems: "center", gap: 14,
                      padding: "12px 18px 12px 21px",
                      borderTop: "1px solid #f3f0e8",
                      borderLeft: `3px solid ${barColor}`
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 700, fontVariantNumeric: "tabular-nums", color: ev.hora ? "#1c1a16" : "#8a8275", minWidth: 52, flexShrink: 0 }}>
                        {ev.hora ? ev.hora : "⚠ s/h"}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1c1a16" }}>{ev.paquete}</div>
                        {ev.operador && <div style={{ fontSize: 11, color: "#8a8275", marginTop: 2 }}>{ev.operador}</div>}
                      </div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        {ev.equipos
                          ? ev.equipos.map(eq => <EquipoPill key={eq} equipo={eq} />)
                          : <span style={{ borderRadius: 999, padding: "3px 10px", fontSize: 10, fontWeight: 700, border: `1px dashed ${C.rojo.text}`, color: C.rojo.text, background: C.rojo.bg }}>Sin definir</span>
                        }
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}

          {/* CTA Pendientes */}
          {pendientes.length > 0 && (
            <div style={{
              marginTop: 24, borderRadius: 14,
              background: C.rojo.soft, border: `1px solid ${C.rojo.border}`,
              borderLeft: `4px solid ${C.rojo.text}`,
              padding: "18px 20px", display: "flex", alignItems: "flex-start", gap: 14
            }}>
              <div style={{
                width: 32, height: 32, borderRadius: "50%", flexShrink: 0,
                background: C.rojo.text, color: "#fff",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 16, fontWeight: 800
              }}>!</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.rojo.dark, marginBottom: 4 }}>
                  {pendientes.length} evento{pendientes.length !== 1 ? "s" : ""} con información incompleta
                </div>
                <div style={{ fontSize: 12, color: C.rojo.text, marginBottom: 12 }}>
                  {pendientes.map(p => `${p.paquete} — ${p.dia}`).join(" · ")}
                </div>
                <button onClick={onGoPendientes} style={{
                  background: C.rojo.text, color: "#fff", border: "none",
                  borderRadius: 10, padding: "8px 16px",
                  fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit"
                }}>
                  Ver pendientes →
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ------------ EVENTOS ------------ */

    function Eventos({ semana, onGoPendientes }) {
      const todosEventos = semana.dias.flatMap(d =>
        d.eventos.map(e => ({ ...e, diaLabel: `${d.dia} ${d.fecha}` }))
      );

      return (
        <div style={{ padding: 48 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "#5a5246", fontWeight: 700, marginBottom: 6 }}>
                AY MORENA EVENTOS · LOGÍSTICA
              </div>
              <h1 style={{ margin: 0, fontSize: 30, fontWeight: 800, letterSpacing: "-0.02em", color: "#1c1a16" }}>
                Detalle de eventos
              </h1>
            </div>
            <div style={{ fontSize: 12, color: "#8a8275", paddingTop: 6 }}>
              {todosEventos.length} eventos · semana {semana.semana}
            </div>
          </div>

          {todosEventos.map((ev, i) => {
            const campos = [
              { label: "Horario",  value: ev.hora,     tipo: "texto" },
              { label: "Duración", value: ev.duracion, tipo: "texto" },
              { label: "Paquete",  value: ev.paquete,  tipo: "texto", noNull: true },
              { label: "Operador", value: ev.operador, tipo: "texto" },
              { label: "Equipos",  value: ev.equipos,  tipo: "equipos" },
              { label: "Notas",    value: ev.notas,    tipo: "texto", ocultar: true }
            ];
            return (
              <div key={ev.id} style={{ borderRadius: 14, border: "1px solid #e2ddd0", overflow: "hidden", marginBottom: 16 }}>
                <div style={{ padding: "16px 20px", display: "flex", alignItems: "flex-start", justifyContent: "space-between", borderBottom: "1px dashed #e2ddd0" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 32, height: 32, background: "#1c1a16", color: "#fafaf7", borderRadius: 8, fontSize: 13, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {String(i + 1).padStart(2, "0")}
                    </div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: "#8a8275", marginBottom: 3 }}>{ev.diaLabel}</div>
                      <div style={{ fontSize: 17, fontWeight: 800, color: "#1c1a16", letterSpacing: "-0.01em" }}>{ev.paquete}</div>
                    </div>
                  </div>
                  <StatusPill status={ev.status} />
                </div>
                {campos.filter(f => !(f.ocultar && f.value == null)).map(({ label, value, tipo, noNull }) => (
                  <div key={label} style={{ display: "flex", alignItems: "center", padding: "10px 20px", borderBottom: "1px dashed #f3f0e8" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.10em", textTransform: "uppercase", color: "#8a8275", minWidth: 90, flexShrink: 0 }}>
                      {label}
                    </div>
                    <div style={{ fontSize: 13, color: "#1c1a16", display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {tipo === "equipos"
                        ? value
                          ? value.map(eq => <EquipoPill key={eq} equipo={eq} />)
                          : <PendientePill />
                        : value != null
                          ? value
                          : noNull ? value : <PendientePill />
                      }
                    </div>
                  </div>
                ))}
              </div>
            );
          })}

          {semana.pendientes.length > 0 && (
            <div style={{ textAlign: "center", paddingTop: 8 }}>
              <button onClick={onGoPendientes} style={{
                background: C.rojo.bg, color: C.rojo.text,
                border: `1px solid ${C.rojo.border}`, borderRadius: 12,
                padding: "12px 24px", fontSize: 13, fontWeight: 700,
                cursor: "pointer", fontFamily: "inherit"
              }}>
                Resolver pendientes ({semana.pendientes.length}) →
              </button>
            </div>
          )}
        </div>
      );
    }

    /* ------------ PENDIENTES ------------ */

    function Pendientes({ semana, onGoResumen }) {
      const { pendientes } = semana;
      const alta  = pendientes.filter(p => p.prioridad === "alta").length;
      const media = pendientes.filter(p => p.prioridad === "media").length;

      return (
        <div style={{ padding: 48 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: C.rojo.text, fontWeight: 700, marginBottom: 6 }}>
                INFORMACIÓN INCOMPLETA
              </div>
              <h1 style={{ margin: 0, fontSize: 30, fontWeight: 800, letterSpacing: "-0.02em", color: "#1c1a16", marginBottom: 6 }}>
                Pendientes de la semana
              </h1>
              <p style={{ margin: 0, fontSize: 14, color: "#5a5246" }}>
                {pendientes.length} evento{pendientes.length !== 1 ? "s" : ""} · resolver antes del viernes
              </p>
            </div>
            <button onClick={onGoResumen} style={{
              background: "#fff", border: "1px solid #ebe7dc", borderRadius: 10,
              padding: "8px 14px", fontSize: 12, fontWeight: 700,
              cursor: "pointer", color: "#1c1a16", fontFamily: "inherit"
            }}>
              ← Volver al resumen
            </button>
          </div>

          {/* Summary strip */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 32 }}>
            <div style={{ borderRadius: 14, padding: 18, background: "#f3f0e8", border: "1px solid #e2ddd0" }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: "#8a8275", marginBottom: 8 }}>Total</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: "#1c1a16", letterSpacing: "-0.02em" }}>{pendientes.length}</div>
            </div>
            <div style={{ borderRadius: 14, padding: 18, background: C.rojo.bg, border: `1px solid ${C.rojo.border}` }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.rojo.text, marginBottom: 8 }}>Prioridad alta</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: C.rojo.dark, letterSpacing: "-0.02em" }}>{alta}</div>
            </div>
            <div style={{ borderRadius: 14, padding: 18, background: C.ambar.bg, border: `1px solid ${C.ambar.border}` }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.ambar.text, marginBottom: 8 }}>Prioridad media</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: C.ambar.dark, letterSpacing: "-0.02em" }}>{media}</div>
            </div>
          </div>

          {pendientes.map(p => (
            <div key={p.id} style={{ borderRadius: 14, border: "1px solid #e2ddd0", overflow: "hidden", marginBottom: 20 }}>
              <div style={{ padding: "16px 20px", background: "#f3f0e8", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 28, height: 28, background: "#1c1a16", color: "#fafaf7", borderRadius: 8, fontSize: 12, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    {p.id}
                  </div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 800, color: "#1c1a16" }}>{p.paquete}</div>
                    <div style={{ fontSize: 12, color: "#5a5246" }}>{p.dia}</div>
                  </div>
                </div>
                <span style={{
                  borderRadius: 999, padding: "3px 10px", fontSize: 10, fontWeight: 700, letterSpacing: "0.04em",
                  background: p.prioridad === "alta" ? C.rojo.bg : C.ambar.bg,
                  border: `1px solid ${p.prioridad === "alta" ? C.rojo.border : C.ambar.border}`,
                  color: p.prioridad === "alta" ? C.rojo.text : C.ambar.text
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: "currentColor", display: "inline-block", marginRight: 4 }} />
                  PRIORIDAD {p.prioridad.toUpperCase()}
                </span>
              </div>

              <div style={{ padding: "16px 20px", borderBottom: "1px solid #f3f0e8" }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.rojo.text, marginBottom: 10 }}>Qué falta</div>
                {p.falta.map(f => (
                  <div key={f.campo} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 8, padding: "8px 12px", background: C.rojo.bg, borderRadius: 8, border: `1px solid ${C.rojo.border}` }}>
                    <span style={{ fontSize: 11, fontWeight: 800, color: C.rojo.text, minWidth: 70, flexShrink: 0 }}>{f.campo}</span>
                    <span style={{ fontSize: 12, color: C.rojo.dark }}>{f.detalle}</span>
                  </div>
                ))}
              </div>

              <div style={{ padding: "16px 20px", borderBottom: "1px solid #f3f0e8", background: C.ambar.bg }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.ambar.text, marginBottom: 8 }}>Impacto en logística</div>
                <div style={{ fontSize: 13, color: C.ambar.dark, lineHeight: 1.6 }}>{p.impacto}</div>
              </div>

              <div style={{ padding: "16px 20px", background: C.verde.bg }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: C.verde.text, marginBottom: 10 }}>Preguntas para enviar</div>
                <ol style={{ margin: 0, paddingLeft: 18 }}>
                  {p.preguntas.map((q, qi) => (
                    <li key={qi} style={{ fontSize: 13, color: C.verde.dark, marginBottom: 6, lineHeight: 1.5 }}>{q}</li>
                  ))}
                </ol>
              </div>
            </div>
          ))}

          <div style={{ borderRadius: 14, padding: "16px 20px", background: "#1c1a16", color: "#fafaf7" }}>
            <span style={{ fontSize: 16, marginRight: 10 }}>💡</span>
            <span style={{ fontSize: 13, fontWeight: 600 }}>
              Una vez confirmadas, actualizá los datos de la semana — el resumen se actualiza automáticamente.
            </span>
          </div>
        </div>
      );
    }

    /* ------------ APP ------------ */

    const PAGES = [
      { id: "resumen",    label: "Resumen",  title: "Resumen de la semana" },
      { id: "eventos",    label: "Eventos",  title: "Detalle por evento" },
      { id: "pendientes", label: "Pendientes", title: "Pendientes", getBadge: s => s.pendientes.length }
    ];

    function App() {
      const [page, setPage] = useState("resumen");
      const idx  = PAGES.findIndex(p => p.id === page);
      const prev = PAGES[idx - 1];
      const next = PAGES[idx + 1];

      const go = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: "smooth" }); };

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "ArrowRight" && next) go(next.id);
          if (e.key === "ArrowLeft"  && prev) go(prev.id);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [page]);

      return (
        <>
          <div className="tabs">
            <div className="tabs-inner">
              <div className="tab-brand">AY Morena · Logística</div>
              {PAGES.map(p => {
                const badge = p.getBadge ? p.getBadge(SEMANA) : null;
                return (
                  <button key={p.id} className={`tab ${page === p.id ? "active" : ""}`} onClick={() => go(p.id)}>
                    <span>{p.label}</span>
                    {badge > 0 && <span className="badge">{badge}</span>}
                  </button>
                );
              })}
              <div className="tab-counter">{idx + 1} / {PAGES.length}</div>
            </div>
          </div>

          <div className="pager">
            <div className="sheet">
              <div key={page} className="page-enter">
                {page === "resumen"    && <Resumen    semana={SEMANA} onGoPendientes={() => go("pendientes")} />}
                {page === "eventos"    && <Eventos    semana={SEMANA} onGoPendientes={() => go("pendientes")} />}
                {page === "pendientes" && <Pendientes semana={SEMANA} onGoResumen={() => go("resumen")} />}
              </div>
            </div>
          </div>

          <div className="footnav">
            {prev
              ? <button className="footbtn" onClick={() => go(prev.id)}><div className="label">← Anterior</div><div className="title">{prev.title}</div></button>
              : <div className="placeholder"></div>}
            {next
              ? <button className="footbtn right" onClick={() => go(next.id)}><div className="label">Siguiente →</div><div className="title">{next.title}</div></button>
              : <div className="placeholder"></div>}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
